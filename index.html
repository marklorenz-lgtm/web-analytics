<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Webtracking Playground</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        button {
            margin: 10px 0;
            padding: 10px 20px;
            cursor: pointer;
        }

        .box {
            height: 800px;
            background: linear-gradient(#f0f0f0, #d0d0d0);
            margin-top: 20px;
            padding: 20px;
        }
    </style>
</head>
<body>

    <h1>Webtracking Testseite</h1>
    <p>Diese Seite dient dazu, verschiedene Tracking-Events lokal zu testen.</p>

    <!-- BUTTON EVENTS -->
    <h2>Buttons (Click Events)</h2>
    <button id="btn1">Button 1</button>
    <button id="btn2">Button 2</button>

    <!-- LINK EVENT -->
    <h2>Link (Navigation Event)</h2>
    <a href="#" id="testLink">Klick mich (Fake-Link)</a>

    <!-- FORM EVENT -->
    <h2>Formular (Submit Event)</h2>
    <form id="testForm">
        <input type="text" placeholder="Name eingeben" required>
        <button type="submit">Absenden</button>
    </form>

    <!-- SCROLL AREA -->
    <h2>Scroll-Bereich</h2>
    <div class="box">
        Scrolle hier nach unten, um Scroll-Tracking zu testen.
    </div>

</body>
</html>
